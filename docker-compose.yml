services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docintel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docintel
    ports:
      - "5432:5432"
    volumes:
      - docintel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docintel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  docintel_pgdata:
